<!DOCTYPE html>
<html>
<head>
<title>Chat</title>
 
<style>
body{
  margin:0;
  font-family:Arial;
  background: url('fundo.jpg.jpg');
  background-size: cover;
  color:white;
}
 
/* overlay escuro */
.overlay{
  background: rgba(0,0,0,0.6);
  height:100vh;
  display:flex;
  flex-direction:column;
}
 
.header{
  background:#202c33;
  padding:10px;
}
 
#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}
 
.msg{
  padding:8px;
  margin:5px;
  border-radius:8px;
  max-width:60%;
}
 
.me{
  background:#005c4b;
  align-self:flex-end;
}
 
.other{
  background:#202c33;
  align-self:flex-start;
}
 
.input-area{
  display:flex;
  padding:10px;
  background:#111;
}
 
.input-area input{
  flex:1;
  padding:10px;
}
 
.input-area button{
  background:#25D366;
  border:none;
  padding:10px;
}
</style>
 
</head>
 
<body>
 
<div class="overlay">
 
<div class="header">
  Sala: <span id="roomName"></span>
</div>
 
<div id="messages"></div>
 
<div class="input-area">
  <input id="msg" placeholder="Mensagem...">
  <button onclick="send()">➤</button>
</div>
 
</div>
 
<script src="/socket.io/socket.io.js"></script>
 
<script>
const socket = io();
 
const myName = localStorage.getItem("name");
const myRoom = localStorage.getItem("room");
 
document.getElementById("roomName").innerText = myRoom;
 
// entra na sala
socket.emit("joinRoom", {
  name: myName,
  room: myRoom
});
 
function send(){
  const input = document.getElementById("msg");
 
  socket.emit("chat message", {
    name: myName,
    msg: input.value,
    room: myRoom
  });
 
  input.value = "";
}
 
socket.on("chat message", (data) => {
 
  if(data.room !== myRoom) return;
 
  const div = document.createElement("div");
  div.classList.add("msg");
 
  if(data.name === myName){
    div.classList.add("me");
  } else {
    div.classList.add("other");
  }
 
  div.innerHTML = `<b>${data.name}</b><br>${data.msg}`;
 
  document.getElementById("messages").appendChild(div);
 
});
</script>
 
</body>
</html>
